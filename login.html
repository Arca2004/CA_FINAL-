<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Academy - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Poppins", sans-serif;
        color: white;
        overflow: hidden;
        position: relative;
        background: url("img/what-is-cybersecurity.jpg") no-repeat center
          center/cover;
      }

      /* Blurred Background Overlay */
      body::before {
        content: "";
        position: absolute;
        width: 100vw;
        height: 100vh;
        background: inherit;
        filter: blur(10px);
        z-index: -1;
      }

      .container {
        position: relative;
        width: 400px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        padding-bottom: 20px;
      }

      .header {
        height: 190px;
        background: url("img/what-is-cybersecurity.jpg") no-repeat center
          center/cover;
        clip-path: ellipse(100% 80% at 50% 20%);
      }

      .form-container {
        padding: 30px;
        text-align: center;
      }

      h2 {
        font-size: 28px;
        font-weight: 700;
        color: #ffcc00;
        text-shadow: 2px 2px 5px rgba(255, 204, 0, 0.8);
      }

      p {
        color: white;
        font-size: 16px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        font-size: 14px;
        outline: none;
        background: transparent;
        color: white;
        transition: border-color 0.3s;
      }

      /* Make the placeholder text white */
      input::placeholder {
        color: white;
        opacity: 1;
      }

      input:focus {
        border-bottom: 2px solid #ffcc00;
      }

      .error-message {
        color: white !important; /* Ensures the text remains white */
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        margin-bottom: 15px;
      }

      .options label {
        display: flex;
        align-items: center;
        font-size: 16px;
        color: white;
        font-weight: 600;
      }

      .options input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #ffcc00;
        margin-right: 8px;
      }

      .login-btn {
        width: 80%;
        background: #ffcc00;
        color: black;
        border: none;
        padding: 14px;
        border-radius: 25px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 8px rgba(255, 204, 0, 0.3);
      }

      .login-btn:hover {
        background: #ff9900;
        box-shadow: 0 6px 12px rgba(255, 204, 0, 0.5);
        transform: scale(1.05);
      }

      .create-account {
        margin-top: 15px;
        font-size: 14px;
        color: white;
      }

      .create-account a {
        color: #ffcc00;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header"></div>
      <div class="form-container">
        <h2>Cyber Academy</h2>
        <p>Welcome to Cyber Academy</p>
        <input type="text" id="username" placeholder="Enter Username" />
        <input type="password" id="password" placeholder="Enter Password" />
        <p class="error-message" id="error-msg">Incorrect credentials!</p>
        <div class="options">
          <label><input type="checkbox" id="remember" /> Remember Me</label>
          <a
            href="#"
            style="color: #ffcc00; text-decoration: none; font-weight: 500"
            >Forgot Password?</a
          >
        </div>
        <button class="login-btn" onclick="login()">LOGIN</button>
        <p class="create-account">
          Create Account? <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </div>

    <script>
      // Check if there's a user already signed in
      document.addEventListener("DOMContentLoaded", function () {
        firebase.auth().onAuthStateChanged(function (user) {
          if (user) {
            // User is signed in, redirect to index
            window.location.href = "index.html";
          }

          // Check remembered user from localStorage for transition support
          const rememberedUser = localStorage.getItem("rememberedUser");
          if (rememberedUser) {
            const user = JSON.parse(rememberedUser);
            document.getElementById("username").value = user.username;
            document.getElementById("password").value = user.password;
            document.getElementById("remember").checked = true;
          }
        });
      });

      function login() {
        // Get input values
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const remember = document.getElementById("remember").checked;
        const errorMsg = document.getElementById("error-msg");

        // Check if fields are empty
        if (username === "" || password === "") {
          errorMsg.innerText = "Email and password cannot be empty!";
          errorMsg.style.display = "block";
          return;
        }

        // Sign in with email and password
        // Note: Firebase uses email/password auth, so username should be email format
        firebase
          .auth()
          .signInWithEmailAndPassword(username, password)
          .then((userCredential) => {
            // User signed in successfully
            const user = userCredential.user;

            // If remember me is checked during the transition period
            if (remember) {
              localStorage.setItem(
                "rememberedUser",
                JSON.stringify({
                  username: username,
                  password: password,
                })
              );
            } else {
              localStorage.removeItem("rememberedUser");
            }

            // Store user info in localStorage for backward compatibility
            localStorage.setItem(
              "currentUser",
              JSON.stringify({
                username: user.email,
                fullname: user.displayName || "Cyber Academy User",
              })
            );

            errorMsg.style.display = "none"; // Hide error message
            document.body.style.opacity = "0"; // Smooth fade-out effect
            setTimeout(() => {
              window.location.href = "index.html"; // Redirect after fade-out
            }, 200);
          })
          .catch((error) => {
            // Handle errors
            console.error("Firebase Auth Error:", error.code, error.message);
            if (
              error.code === "auth/user-not-found" ||
              error.code === "auth/wrong-password"
            ) {
              errorMsg.innerText = "Incorrect email or password!";
            } else if (error.code === "auth/invalid-email") {
              errorMsg.innerText = "Please enter a valid email address!";
            } else {
              errorMsg.innerText = "Login failed: " + error.message;
            }
            errorMsg.style.display = "block";

            // Legacy login fallback during transition period
            legacyLogin(username, password, remember);
          });
      }

      // Legacy login function for backward compatibility during transition
      function legacyLogin(username, password, remember) {
        // Get users from localStorage
        const users = JSON.parse(localStorage.getItem("users") || "[]");

        // Add default admin user if no users exist yet
        if (users.length === 0) {
          users.push({
            username: "admin",
            password: "password123",
          });
          localStorage.setItem("users", JSON.stringify(users));
        }

        // Check if user exists and password matches
        const user = users.find(
          (u) => u.username === username && u.password === password
        );

        if (user) {
          if (remember) {
            localStorage.setItem(
              "rememberedUser",
              JSON.stringify({
                username: username,
                password: password,
              })
            );
          } else {
            localStorage.removeItem("rememberedUser");
          }

          localStorage.setItem(
            "currentUser",
            JSON.stringify({
              username: user.username,
              fullname: user.fullname || "Admin User",
            })
          );

          const errorMsg = document.getElementById("error-msg");
          errorMsg.style.display = "none";
          document.body.style.opacity = "0";
          setTimeout(() => {
            window.location.href = "index.html";
          }, 200);

          // Migrate user to Firebase
          migrateUserToFirebase(
            username,
            password,
            user.fullname || "Admin User",
            user.email || `${username}@example.com`
          );
        }
      }

      // Function to migrate localStorage users to Firebase
      function migrateUserToFirebase(username, password, fullname, email) {
        // Create user in Firebase Auth
        firebase
          .auth()
          .createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // Update profile with fullname
            return userCredential.user.updateProfile({
              displayName: fullname,
            });
          })
          .then(() => {
            console.log("User migrated to Firebase successfully");

            // Save additional user data to Firestore
            return firebase
              .firestore()
              .collection("users")
              .doc(firebase.auth().currentUser.uid)
              .set({
                username: username,
                fullname: fullname,
                email: email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                migrated: true,
              });
          })
          .catch((error) => {
            console.error("Error migrating user to Firebase:", error);
          });
      }

      // Allow pressing "Enter" to trigger login
      document.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          login();
        }
      });
    </script>
  </body>
</html>
