<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Academy - Sign Up</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Poppins", sans-serif;
        color: white;
        position: relative;
        background: url("img/what-is-cybersecurity.jpg") no-repeat center
          center/cover;
        padding: 20px;
      }

      /* Blurred Background Overlay */
      body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        z-index: -1;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 420px;
        background: rgba(25, 25, 25, 0.8);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        box-shadow: 0px 8px 30px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        padding-bottom: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .header {
        height: 160px;
        background: url("img/what-is-cybersecurity.jpg") no-repeat center
          center/cover;
        position: relative;
      }

      .header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: linear-gradient(to top, rgba(25, 25, 25, 0.8), transparent);
      }

      .form-container {
        padding: 30px;
        text-align: center;
      }

      h2 {
        font-size: 28px;
        font-weight: 700;
        color: #ffcc00;
        text-shadow: 2px 2px 5px rgba(255, 204, 0, 0.5);
        margin-bottom: 5px;
      }

      p {
        color: white;
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 20px;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
      }

      .input-group i {
        position: absolute;
        left: 12px;
        top: 16px;
        color: rgba(255, 255, 255, 0.7);
      }

      input {
        width: 100%;
        padding: 14px 14px 14px 40px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        font-size: 15px;
        outline: none;
        color: white;
        transition: all 0.3s;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Make the placeholder text white */
      input::placeholder {
        color: rgba(255, 255, 255, 0.7);
      }

      input:focus {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 204, 0, 0.5);
        box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
      }

      .error-message {
        color: #ff6b6b !important;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }

      .success-message {
        color: #5cdb95 !important;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }

      .options {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .options label {
        display: flex;
        align-items: center;
        font-size: 15px;
        color: white;
      }

      .options input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #ffcc00;
        margin-right: 8px;
      }

      .signup-btn {
        width: 100%;
        background: #ffcc00;
        color: black;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 8px rgba(255, 204, 0, 0.3);
        margin-bottom: 15px;
      }

      .signup-btn:hover {
        background: #ff9900;
        box-shadow: 0 6px 12px rgba(255, 204, 0, 0.5);
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
        color: rgba(255, 255, 255, 0.7);
      }

      .divider hr {
        flex: 1;
        border: none;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
      }

      .divider span {
        padding: 0 15px;
        font-size: 14px;
      }

      .google-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        background: #fff;
        color: #444;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
      }

      .google-btn:hover {
        background: #f0f0f0;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      }

      .google-btn img {
        width: 20px;
        margin-right: 10px;
      }

      .login-account {
        margin-top: 15px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
      }

      .login-account a {
        color: #ffcc00;
        text-decoration: none;
        font-weight: 600;
      }

      .login-account a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        .container {
          width: 95%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header"></div>
      <div class="form-container">
        <h2>Cyber Academy</h2>
        <p>Create Your Account</p>

        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="fullname" placeholder="Enter Full Name" />
        </div>

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Enter Email" />
        </div>

        <div class="input-group">
          <i class="fas fa-user-tag"></i>
          <input type="text" id="username" placeholder="Create Username" />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Create Password" />
        </div>

        <div class="input-group">
          <i class="fas fa-key"></i>
          <input
            type="password"
            id="confirm-password"
            placeholder="Confirm Password"
          />
        </div>

        <p class="error-message" id="error-msg"></p>
        <p class="success-message" id="success-msg"></p>

        <div class="options">
          <label>
            <input type="checkbox" id="terms" />
            I agree to Terms & Conditions
          </label>
        </div>

        <button class="signup-btn" onclick="signup()">
          <i class="fas fa-user-plus"></i> SIGN UP
        </button>

        <div class="divider">
          <hr />
          <span>OR</span>
          <hr />
        </div>

        <button class="google-btn" onclick="signupWithGoogle()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 48 48"
            width="20px"
            height="20px"
          >
            <path
              fill="#FFC107"
              d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"
            />
            <path
              fill="#FF3D00"
              d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"
            />
            <path
              fill="#4CAF50"
              d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"
            />
            <path
              fill="#1976D2"
              d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"
            />
          </svg>
          Sign up with Google
        </button>

        <p class="login-account">
          Already have an account? <a href="login.html">Log In</a>
        </p>
      </div>
    </div>

    <script>
      function signup() {
        // Get input values
        const fullname = document.getElementById("fullname").value.trim();
        const email = document.getElementById("email").value.trim();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirmPassword = document
          .getElementById("confirm-password")
          .value.trim();
        const terms = document.getElementById("terms").checked;
        const errorMsg = document.getElementById("error-msg");
        const successMsg = document.getElementById("success-msg");

        // Hide previous messages
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        // Validate inputs
        if (!fullname || !email || !username || !password || !confirmPassword) {
          errorMsg.innerText = "All fields are required!";
          errorMsg.style.display = "block";
          return;
        }

        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          errorMsg.innerText = "Please enter a valid email address!";
          errorMsg.style.display = "block";
          return;
        }

        // Password validation
        if (password.length < 6) {
          errorMsg.innerText = "Password must be at least 6 characters long!";
          errorMsg.style.display = "block";
          return;
        }

        // Confirm password
        if (password !== confirmPassword) {
          errorMsg.innerText = "Passwords do not match!";
          errorMsg.style.display = "block";
          return;
        }

        // Terms checkbox
        if (!terms) {
          errorMsg.innerText = "You must agree to the Terms & Conditions!";
          errorMsg.style.display = "block";
          return;
        }

        // Create user with Firebase Authentication
        firebase
          .auth()
          .createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // Update user profile with full name
            return userCredential.user.updateProfile({
              displayName: fullname,
            });
          })
          .then(() => {
            // Save additional user data to Firestore
            return firebase
              .firestore()
              .collection("users")
              .doc(firebase.auth().currentUser.uid)
              .set({
                fullname: fullname,
                email: email,
                username: username,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                authProvider: "email",
              });
          })
          .then(() => {
            // Legacy localStorage support during transition
            const users = JSON.parse(localStorage.getItem("users") || "[]");
            if (!users.some((user) => user.username === username)) {
              users.push({
                fullname,
                email,
                username,
                password,
              });
              localStorage.setItem("users", JSON.stringify(users));
            }

            // Show success message
            successMsg.innerText =
              "Account created successfully! Redirecting to login...";
            successMsg.style.display = "block";

            // Clear form
            document.getElementById("fullname").value = "";
            document.getElementById("email").value = "";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("confirm-password").value = "";
            document.getElementById("terms").checked = false;

            // Sign out the user (since we want them to sign in on the login page)
            firebase.auth().signOut();

            // Redirect to login page after delay
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          })
          .catch((error) => {
            console.error("Firebase Auth Error:", error.code, error.message);

            if (error.code === "auth/email-already-in-use") {
              errorMsg.innerText =
                "Email already in use. Please use a different email or try logging in.";
            } else if (error.code === "auth/weak-password") {
              errorMsg.innerText =
                "Password is too weak. Please choose a stronger password.";
            } else {
              errorMsg.innerText = "Error creating account: " + error.message;
            }
            errorMsg.style.display = "block";

            // Try legacy signup if Firebase fails (during transition period)
            legacySignup();
          });
      }

      // Google Sign Up
      function signupWithGoogle() {
        const errorMsg = document.getElementById("error-msg");
        const successMsg = document.getElementById("success-msg");

        // Clear previous messages
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        // Show loading message
        successMsg.innerText = "Connecting to Google...";
        successMsg.style.display = "block";

        // Create Google auth provider
        const provider = new firebase.auth.GoogleAuthProvider();

        // Sign in with popup
        firebase
          .auth()
          .signInWithPopup(provider)
          .then((result) => {
            // Get user info
            const user = result.user;
            const isNewUser = result.additionalUserInfo.isNewUser;

            // If this is a new user, save their info to Firestore
            if (isNewUser) {
              successMsg.innerText = "Creating your account...";
              return firebase
                .firestore()
                .collection("users")
                .doc(user.uid)
                .set({
                  fullname: user.displayName,
                  email: user.email,
                  username: user.email.split("@")[0], // Create a username from email
                  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                  authProvider: "google",
                })
                .then(() => {
                  successMsg.innerText =
                    "Account created successfully! Redirecting to login...";
                  return "new_user";
                });
            } else {
              successMsg.innerText = "Welcome back! Redirecting to login...";
              return "returning_user";
            }
          })
          .then((userStatus) => {
            // Show appropriate success message
            successMsg.style.display = "block";

            // Sign out the user (since we want them to sign in on the login page)
            return firebase
              .auth()
              .signOut()
              .then(() => userStatus);
          })
          .then((userStatus) => {
            // Redirect to login page with appropriate delay
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          })
          .catch((error) => {
            console.error("Google Sign In Error:", error);
            errorMsg.innerText =
              "Error signing in with Google: " + error.message;
            errorMsg.style.display = "block";
            successMsg.style.display = "none";
          });
      }

      // Legacy signup function for backward compatibility during transition
      function legacySignup() {
        const fullname = document.getElementById("fullname").value.trim();
        const email = document.getElementById("email").value.trim();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorMsg = document.getElementById("error-msg");
        const successMsg = document.getElementById("success-msg");

        // Check if username already exists
        const users = JSON.parse(localStorage.getItem("users") || "[]");
        if (users.some((user) => user.username === username)) {
          errorMsg.innerText =
            "Username already exists. Please choose another one!";
          errorMsg.style.display = "block";
          return;
        }

        // Create user object
        const newUser = {
          fullname,
          email,
          username,
          password,
        };

        // Add new user to users array
        users.push(newUser);

        // Save to localStorage
        localStorage.setItem("users", JSON.stringify(users));

        // Show success message
        successMsg.innerText =
          "Account created successfully! Redirecting to login...";
        successMsg.style.display = "block";

        // Clear form
        document.getElementById("fullname").value = "";
        document.getElementById("email").value = "";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("confirm-password").value = "";
        document.getElementById("terms").checked = false;

        // Redirect to login page after delay
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }

      // Allow pressing "Enter" to trigger signup
      document.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          signup();
        }
      });
    </script>
  </body>
</html>
